<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ultimate Accessible Date Picker</title>
    <link rel="stylesheet" href="datepicker.css" />
    <script src="datepicker.js" defer></script>
  </head>
  <body>
    <div class="container">
      <h3 class="title">상세 일정 (연/월/일/시/분)</h3>
      <div class="input-group date_picker theme-orange">
        <div class="picker-wrapper" data-columns="year,month,day,hour,minute" data-format="YYYY년 MM월 DD일 HH:mm">
          <input type="text" class="picker-input" placeholder="날짜 및 시간 선택" readonly />
          <button type="button" class="picker-icon-btn" aria-label="일정 선택">📅</button>
        </div>
      </div>
      <br />

      <h3 class="title">숙박 기간 (연/월/일)</h3>
      <div class="input-group date_picker">
        <div class="picker-wrapper" data-columns="year,month,day" data-format="YYYY-MM-DD">
          <input type="text" class="picker-input" placeholder="체크인" readonly />
          <button type="button" class="picker-icon-btn" aria-label="체크인 선택">📅</button>
        </div>
        <div class="picker-wrapper" data-columns="year,month,day" data-format="YYYY-MM-DD">
          <input type="text" class="picker-input" placeholder="체크아웃" readonly />
          <button type="button" class="picker-icon-btn" aria-label="체크아웃 선택">📅</button>
        </div>
      </div>
      <br />

      <h3 class="title">생일 또는 기념일 (월/일)</h3>
      <div class="input-group date_picker theme-orange">
        <div class="picker-wrapper" data-columns="month,day" data-format="MM/DD (ddd)">
          <input type="text" class="picker-input" placeholder="월/일 선택" readonly />
          <button type="button" class="picker-icon-btn" aria-label="기념일 선택">🎉</button>
        </div>
      </div>
      <br />

      <h3 class="title">알람 설정 (시/분)</h3>
      <div class="input-group date_picker">
        <div class="picker-wrapper" data-columns="hour,minute" data-format="A hh:mm">
          <input type="text" class="picker-input" placeholder="시간 선택" readonly />
          <button type="button" class="picker-icon-btn" aria-label="시간 선택">⏰</button>
        </div>
      </div>
    </div>

    <div class="picker-overlay"></div>
    <div class="bottom-sheet" role="dialog" aria-modal="true">
      <div class="sheet-header">
        <button class="btn-close">취소</button>
        <button class="btn-done">완료</button>
      </div>

      <div class="picker-area">
        <div class="highlight-bar"></div>
      </div>
    </div>
  </body>
</html>
